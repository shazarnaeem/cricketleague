<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Bracket — PUBGM WOW Ramadan Cricket Showdown</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="app-layout">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <div class="logo-icon">🏏</div>
                    <div class="logo-text"><span class="brand">PUBGM WOW</span><span class="sub">Ramadan Cricket
                            Showdown</span></div>
                </a>
            </div>
            <nav class="sidebar-nav">
                <span class="nav-section-label">Main</span>
                <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
                <a href="standings.html" class="nav-link"><span class="nav-icon">📊</span> Points Table</a>
                <a href="bracket.html" class="nav-link active"><span class="nav-icon">🏆</span> Tournament Bracket</a>
                <span class="nav-section-label">Management</span>
                <a href="teams.html" class="nav-link"><span class="nav-icon">👥</span> Teams & Players</a>
                <a href="matches.html" class="nav-link"><span class="nav-icon">📅</span> Matches / Schedule</a>
                <a href="score.html" class="nav-link"><span class="nav-icon">🏏</span> Score Entry</a>
                <span class="nav-section-label">Insights</span>
                <a href="stats.html" class="nav-link"><span class="nav-icon">📈</span> Player Stats</a>
                <a href="settings.html" class="nav-link"><span class="nav-icon">⚙️</span> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-title-area">
                    <h1>🏆 Tournament Bracket</h1>
                    <p>Visual path to the championship</p>
                </div>
            </div>

            <div class="page-content">
                <div class="bracket-container" id="bracketContainer">
                    <!-- Brackets injected here -->
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div id="loadingOverlay"
        style="position:fixed; inset:0; background:rgba(5,22,26,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
        <div class="logo-icon animate-pulse"
            style="font-size:50px; background:linear-gradient(135deg,var(--yellow-primary),var(--cyan-primary)); width:80px; height:80px; border-radius:15px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-yellow);">
            🏏</div>
        <div
            style="font-family:'Rajdhani',sans-serif; color:var(--cyan-primary); font-size:18px; letter-spacing:2px; font-weight:700;">
            SYNCING LIVE DATA...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const overlay = document.getElementById('loadingOverlay');
            try {
                await renderBracket();
            } catch (e) {
                console.error('Bracket Load Error:', e);
                showToast('Bracket load nahi ho saka.', 'error');
            } finally {
                if (overlay) {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 300);
                }
            }
        });

        async function renderBracket() {
            const matches = await getMatchesAsync();
            const teams = await getTeamsAsync();
            const results = await getResultsAsync();
            const container = document.getElementById('bracketContainer');

            if (matches.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>No bracket yet</h3><p>Schedule matches to see the bracket.</p></div>`;
                return;
            }

            const rounds = {};
            matches.forEach(m => {
                if (!rounds[m.round]) rounds[m.round] = [];
                rounds[m.round].push(m);
            });

            container.innerHTML = Object.keys(rounds).map(rName => `
                <div class="round">
                    <div class="round-title">${rName}</div>
                    <div class="round-matches">
                        ${rounds[rName].map(match => {
                const t1 = teams.find(t => t.id === match.team1Id);
                const t2 = teams.find(t => t.id === match.team2Id);
                const res = results.find(r => r.matchId === match.id);
                const t1Won = res && res.winnerId === match.team1Id;
                const t2Won = res && res.winnerId === match.team2Id;

                return `
                                <div class="bracket-match animate-in">
                                    <div class="bracket-team ${t1Won ? 'winner' : ''}">
                                        <span class="team-emoji">${t1?.emoji || '❔'}</span>
                                        <span class="team-name">${t1?.name || 'TBD'}</span>
                                        ${res ? `<span class="team-score">${res.team1Runs}</span>` : ''}
                                    </div>
                                    <div class="bracket-team ${t2Won ? 'winner' : ''}">
                                        <span class="team-emoji">${t2?.emoji || '❔'}</span>
                                        <span class="team-name">${t2?.name || 'TBD'}</span>
                                        ${res ? `<span class="team-score">${res.team2Runs}</span>` : ''}
                                    </div>
                                    <div class="bracket-match-footer">
                                        <span class="badge ${match.status === 'completed' ? 'badge-green' : 'badge-blue'}">${match.status.toUpperCase()}</span>
                                    </div>
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>

</html>

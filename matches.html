<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matches — PUBGM WOW Ramadan Cricket Showdown</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="app-layout">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <div class="logo-icon">🏏</div>
                    <div class="logo-text"><span class="brand">PUBGM WOW</span><span class="sub">Ramadan Cricket
                            Showdown</span></div>
                </a>
            </div>
            <nav class="sidebar-nav">
                <span class="nav-section-label">Main</span>
                <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
                <a href="standings.html" class="nav-link"><span class="nav-icon">📊</span> Points Table</a>
                <a href="bracket.html" class="nav-link"><span class="nav-icon">🏆</span> Tournament Bracket</a>
                <span class="nav-section-label">Management</span>
                <a href="teams.html" class="nav-link"><span class="nav-icon">👥</span> Teams & Players</a>
                <a href="matches.html" class="nav-link active"><span class="nav-icon">📅</span> Matches / Schedule</a>
                <a href="score.html" class="nav-link"><span class="nav-icon">🏏</span> Score Entry</a>
                <span class="nav-section-label">Insights</span>
                <a href="stats.html" class="nav-link"><span class="nav-icon">📈</span> Player Stats</a>
                <a href="settings.html" class="nav-link"><span class="nav-icon">⚙️</span> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-title-area">
                    <h1>📅 Matches / Schedule</h1>
                    <p>Schedule and manage tournament matches</p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-primary" id="addMatchBtn">➕ Add Match</button>
                </div>
            </div>

            <div class="page-content">
                <div class="matches-list" id="matchesList"></div>
            </div>
        </main>
    </div>

    <!-- Match Modal -->
    <div class="modal-overlay" id="matchModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="matchModalTitle">Schedule Match</div>
                <button class="modal-close" onclick="closeModal('matchModal')">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editMatchId" />
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Team 1 *</label>
                        <select class="form-control" id="matchTeam1"></select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Team 2 *</label>
                        <select class="form-control" id="matchTeam2"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Round</label>
                        <input class="form-control" id="matchRound" placeholder="e.g. Round 1, Semi-Final" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Venue</label>
                        <input class="form-control" id="matchVenue" placeholder="Stadium Name" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input class="form-control" type="date" id="matchDate" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <input class="form-control" type="time" id="matchTime" />
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('matchModal')">Cancel</button>
                <button class="btn btn-primary" id="saveMatchBtn" onclick="saveMatch()">💾 Save Match</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div id="loadingOverlay"
        style="position:fixed; inset:0; background:rgba(5,22,26,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
        <div class="logo-icon animate-pulse"
            style="font-size:50px; background:linear-gradient(135deg,var(--yellow-primary),var(--cyan-primary)); width:80px; height:80px; border-radius:15px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-yellow);">
            🏏</div>
        <div
            style="font-family:'Rajdhani',sans-serif; color:var(--cyan-primary); font-size:18px; letter-spacing:2px; font-weight:700;">
            SYNCING LIVE DATA...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const overlay = document.getElementById('loadingOverlay');
            try {
                await renderMatches();
                document.getElementById('addMatchBtn').addEventListener('click', () => openMatchModal());
            } catch (e) {
                console.error(e);
                showToast('Matches load karne mein masala hua.', 'error');
            } finally {
                if (overlay) {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 300);
                }
            }
        });

        async function renderMatches() {
            const matches = await getMatchesAsync();
            const teams = await getTeamsAsync();
            const results = await getResultsAsync();
            const list = document.getElementById('matchesList');

            if (matches.length === 0) {
                list.innerHTML = `<div class="empty-state"><h3>No matches scheduled</h3><p>Start by adding your first match.</p></div>`;
                return;
            }

            list.innerHTML = matches.map((match, idx) => {
                const t1 = teams.find(t => t.id === match.team1Id);
                const t2 = teams.find(t => t.id === match.team2Id);
                if (!t1 || !t2) return '';
                const res = results.find(r => r.matchId === match.id);

                return `
                    <div class="match-card animate-in">
                        <div class="match-teams-display">
                            <div class="match-team">
                                <div class="team-emoji-large" style="background:${t1.color}22;">${t1.emoji}</div>
                                <div class="team-name-small">${t1.name}</div>
                            </div>
                            <div class="match-vs">VS</div>
                            <div class="match-team">
                                <div class="team-emoji-large" style="background:${t2.color}22;">${t2.emoji}</div>
                                <div class="team-name-small">${t2.name}</div>
                            </div>
                        </div>
                        <div class="match-footer">
                            <div class="match-time-info">
                                <div style="font-size:13px; font-weight:600;">${match.round || 'Round 1'}</div>
                                <div style="font-size:11px; color:var(--text-muted);">${match.date || 'TBD'} | ${match.time || '--:--'}</div>
                            </div>
                            <div class="match-actions-row">
                                <span class="badge ${match.status === 'completed' ? 'badge-green' : 'badge-blue'}">${match.status.toUpperCase()}</span>
                                <button class="btn btn-outline btn-icon btn-sm" onclick="openMatchModal('${match.id}')">✏️</button>
                                <button class="btn btn-danger btn-icon btn-sm" onclick="deleteMatchConfirm('${match.id}')">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openMatchModal(matchId = null) {
            const teams = await getTeamsAsync();
            const t1Select = document.getElementById('matchTeam1');
            const t2Select = document.getElementById('matchTeam2');

            const options = teams.map(t => `<option value="${t.id}">${t.emoji} ${t.name}</option>`).join('');
            t1Select.innerHTML = options;
            t2Select.innerHTML = options;

            if (matchId) {
                const match = await getMatchByIdAsync(matchId);
                document.getElementById('editMatchId').value = matchId;
                t1Select.value = match.team1Id;
                t2Select.value = match.team2Id;
                document.getElementById('matchRound').value = match.round;
                document.getElementById('matchVenue').value = match.venue;
                document.getElementById('matchDate').value = match.date;
                document.getElementById('matchTime').value = match.time;
            } else {
                document.getElementById('editMatchId').value = '';
                document.getElementById('matchRound').value = 'Round 1';
                document.getElementById('matchVenue').value = '';
            }
            openModal('matchModal');
        }

        async function saveMatch() {
            const btn = document.getElementById('saveMatchBtn');
            btn.disabled = true;
            btn.innerHTML = 'Saving...';

            const matchData = {
                team1Id: document.getElementById('matchTeam1').value,
                team2Id: document.getElementById('matchTeam2').value,
                round: document.getElementById('matchRound').value,
                venue: document.getElementById('matchVenue').value,
                date: document.getElementById('matchDate').value,
                time: document.getElementById('matchTime').value
            };

            const id = document.getElementById('editMatchId').value;
            try {
                if (id) await updateMatchAsync(id, matchData);
                else await createMatchAsync(matchData);
                showToast('Match save ho gaya!');
                closeModal('matchModal');
                await renderMatches();
            } catch (e) {
                showToast('Save failed.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '💾 Save Match';
            }
        }

        async function deleteMatchConfirm(id) {
            if (confirm('Delete this match?')) {
                await deleteMatchAsync(id);
                showToast('Match deleted.');
                await renderMatches();
            }
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>

</html>
